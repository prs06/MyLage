<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLage - Fuel Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4A90E2;
            --primary-dark: #357ABD;
            --success: #5CB85C;
            --warning: #F0AD4E;
            --danger: #D9534F;
            --bg: #F5F7FA;
            --card-bg: #FFFFFF;
            --text: #333333;
            --text-light: #6C757D;
            --border: #E1E8ED;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding-bottom: 2rem;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1.5rem 1rem;
            text-align: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            background: white;
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 5rem;
            z-index: 99;
            box-shadow: var(--shadow);
        }

        .tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-light);
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .tab:hover {
            background: var(--bg);
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: var(--bg);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }

        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text);
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-group input[readonly] {
            background: var(--bg);
            color: var(--text-light);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-success {
            background: #D4EDDA;
            color: #155724;
            border: 1px solid #C3E6CB;
        }

        .alert-error {
            background: #F8D7DA;
            color: #721C24;
            border: 1px solid #F5C6CB;
        }

        .alert-warning {
            background: #FFF3CD;
            color: #856404;
            border: 1px solid #FFEAA7;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-box {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1.25rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .stat-box.success {
            background: linear-gradient(135deg, #5CB85C 0%, #449D44 100%);
        }

        .stat-box.warning {
            background: linear-gradient(135deg, #F0AD4E 0%, #EC971F 100%);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .vehicle-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
        }

        .vehicle-header {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .vehicle-stats {
            display: grid;
            gap: 0.75rem;
        }

        .vehicle-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background: var(--bg);
            border-radius: 8px;
        }

        .vehicle-stat-label {
            font-weight: 500;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .vehicle-stat-value {
            font-weight: 600;
            color: var(--text);
            font-size: 1rem;
        }

        .trend {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .trend.up {
            background: #D4EDDA;
            color: #155724;
        }

        .trend.down {
            background: #F8D7DA;
            color: #721C24;
        }

        .trend.stable {
            background: #FFF3CD;
            color: #856404;
        }

        .mileage-list {
            display: grid;
            gap: 1rem;
        }

        .mileage-item {
            background: var(--bg);
            padding: 1rem;
            border-radius: 8px;
            border-left: 3px solid var(--primary);
        }

        .mileage-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .mileage-date {
            font-weight: 600;
            color: var(--text);
        }

        .mileage-vehicle {
            background: var(--primary);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .mileage-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .mileage-detail {
            text-align: center;
        }

        .mileage-detail-value {
            font-weight: 600;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .mileage-detail-label {
            color: var(--text-light);
            font-size: 0.8rem;
        }

        .best-vehicle {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #333;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
            font-size: 1.1rem;
        }

        .loading {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-light);
        }

        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.5rem;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .vehicle-header {
                font-size: 1.1rem;
            }

            .mileage-details {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }

            .mileage-detail {
                text-align: left;
                display: flex;
                justify-content: space-between;
            }
        }

        .refresh-btn {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
            width: 100%;
        }

        .refresh-btn:hover {
            background: var(--primary);
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚗 MyLage</h1>
        <p>Track Your Fuel Efficiency</p>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="capture">📝 Capture</div>
        <div class="tab" data-tab="view">📊 View Mileage</div>
    </div>

    <div class="container">
        <!-- CAPTURE TAB -->
        <div class="tab-content active" id="capture">
            <div id="alertContainer"></div>
            
            <div class="card">
                <h2>⛽ Add Fuel Entry</h2>
                <form id="fuelForm">
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                    </div>

                    <div class="form-group">
                        <label for="vehicle">Vehicle Number</label>
                        <select id="vehicle" required>
                            <option value="">Select Vehicle</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="petrolPump">Petrol Pump</label>
                        <select id="petrolPump" required>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="speedometer">Speedometer Reading (kms)</label>
                        <input type="number" id="speedometer" step="0.01" max="9999999999" required>
                    </div>

                    <div class="form-group">
                        <label for="pricePerLiter">Price Per Liter (INR)</label>
                        <input type="number" id="pricePerLiter" step="0.01" max="9999999999" required>
                    </div>

                    <div class="form-group">
                        <label for="liters">Liters</label>
                        <input type="number" id="liters" step="0.01" max="9999999999" required>
                    </div>

                    <div class="form-group">
                        <label for="total">Total (INR)</label>
                        <input type="number" id="total" step="0.01" readonly>
                    </div>

                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        Submit Entry
                    </button>
                </form>
            </div>
        </div>

        <!-- VIEW MILEAGE TAB -->
        <div class="tab-content" id="view">
            <button class="refresh-btn" id="refreshBtn">🔄 Refresh Data</button>
            <div id="viewContent"></div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            // REPLACE THIS WITH YOUR GOOGLE APPS SCRIPT WEB APP URL
            API_URL: 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE',
            CACHE_KEY: 'mylage_data_cache',
            CACHE_TIMESTAMP_KEY: 'mylage_cache_timestamp',
            CACHE_DURATION: 5 * 60 * 1000 // 5 minutes
        };

        // State
        let cachedData = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', init);

        function init() {
            // Set default date to today (IST)
            setDefaultDate();

            // Tab switching
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => switchTab(tab.dataset.tab));
            });

            // Auto-calculate total
            document.getElementById('pricePerLiter').addEventListener('input', calculateTotal);
            document.getElementById('liters').addEventListener('input', calculateTotal);

            // Form submission
            document.getElementById('fuelForm').addEventListener('submit', handleFormSubmit);

            // Refresh button
            document.getElementById('refreshBtn').addEventListener('click', () => {
                clearCache();
                loadViewData();
            });

            // Load view data if on that tab
            if (document.querySelector('.tab.active').dataset.tab === 'view') {
                loadViewData();
            }
        }

        function setDefaultDate() {
            const today = new Date();
            // Convert to IST (UTC+5:30)
            const istOffset = 5.5 * 60 * 60 * 1000;
            const istDate = new Date(today.getTime() + istOffset);
            const dateStr = istDate.toISOString().split('T')[0];
            document.getElementById('date').value = dateStr;
        }

        function switchTab(tabName) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');

            // Update tab content
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');

            // Load data for view tab
            if (tabName === 'view') {
                loadViewData();
            }
        }

        function calculateTotal() {
            const price = parseFloat(document.getElementById('pricePerLiter').value) || 0;
            const liters = parseFloat(document.getElementById('liters').value) || 0;
            const total = (price * liters).toFixed(2);
            document.getElementById('total').value = total;
        }

        function showAlert(message, type = 'success') {
            const alertContainer = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alertContainer.appendChild(alert);

            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        async function handleFormSubmit(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            const formData = {
                date: document.getElementById('date').value,
                vehicle: document.getElementById('vehicle').value,
                petrolPump: document.getElementById('petrolPump').value,
                speedometer: parseFloat(document.getElementById('speedometer').value),
                pricePerLiter: parseFloat(document.getElementById('pricePerLiter').value),
                liters: parseFloat(document.getElementById('liters').value),
                total: parseFloat(document.getElementById('total').value)
            };

            // Validation
            if (!validateForm(formData)) {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Entry';
                return;
            }

            try {
                const response = await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                // Due to no-cors, we can't read the response, so assume success
                showAlert('✅ Fuel entry added successfully!', 'success');
                document.getElementById('fuelForm').reset();
                setDefaultDate();
                clearCache();
                
            } catch (error) {
                console.error('Error:', error);
                showAlert('❌ Error submitting entry. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Entry';
            }
        }

        function validateForm(data) {
            // Check if speedometer is lower than previous for same vehicle
            if (cachedData) {
                const vehicleEntries = cachedData.filter(e => e.vehicle === data.vehicle);
                if (vehicleEntries.length > 0) {
                    const lastEntry = vehicleEntries[vehicleEntries.length - 1];
                    if (data.speedometer < lastEntry.speedometer) {
                        const proceed = confirm(`⚠️ Warning: Speedometer reading (${data.speedometer} km) is less than previous entry (${lastEntry.speedometer} km) for this vehicle. Do you want to continue?`);
                        if (!proceed) return false;
                    }
                }
            }
            return true;
        }

        function clearCache() {
            localStorage.removeItem(CONFIG.CACHE_KEY);
            localStorage.removeItem(CONFIG.CACHE_TIMESTAMP_KEY);
            cachedData = null;
        }

        function getCache() {
            const timestamp = localStorage.getItem(CONFIG.CACHE_TIMESTAMP_KEY);
            const data = localStorage.getItem(CONFIG.CACHE_KEY);

            if (timestamp && data) {
                const age = Date.now() - parseInt(timestamp);
                if (age < CONFIG.CACHE_DURATION) {
                    return JSON.parse(data);
                }
            }
            return null;
        }

        function setCache(data) {
            localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify(data));
            localStorage.setItem(CONFIG.CACHE_TIMESTAMP_KEY, Date.now().toString());
        }

        async function loadViewData() {
            const viewContent = document.getElementById('viewContent');
            viewContent.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading data...</p></div>';

            try {
                // Try cache first
                let data = getCache();

                if (!data) {
                    const response = await fetch(CONFIG.API_URL);
                    data = await response.json();
                    setCache(data);
                }

                cachedData = data;

                if (!data || data.length === 0) {
                    viewContent.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📊</div>
                            <h3>No Data Yet</h3>
                            <p>Start by adding your first fuel entry in the Capture tab.</p>
                        </div>
                    `;
                    return;
                }

                renderViewData(data);

            } catch (error) {
                console.error('Error loading data:', error);
                viewContent.innerHTML = `
                    <div class="alert alert-error">
                        ❌ Error loading data. Please check your API URL configuration and try again.
                    </div>
                `;
            }
        }

        function renderViewData(data) {
            const viewContent = document.getElementById('viewContent');

            // Sort by date ascending
            data.sort((a, b) => new Date(a.date) - new Date(b.date));

            let html = '';

            // Global Statistics
            html += renderGlobalStats(data);

            // Best Vehicle
            html += renderBestVehicle(data);

            // Vehicle-wise Dashboard
            html += renderVehicleDashboard(data);

            // Per Entry Mileage
            html += renderPerEntryMileage(data);

            viewContent.innerHTML = html;
        }

        function renderGlobalStats(data) {
            const totalMileage = calculateTotalMileage(data);
            const avgLast5 = calculateAverageMileage(data, 5);
            const trend = calculateTrend(data);

            return `
                <div class="card">
                    <h2>📈 Global Statistics</h2>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-value">${totalMileage.toFixed(2)}</div>
                            <div class="stat-label">Total Mileage (km/l)</div>
                        </div>
                        <div class="stat-box success">
                            <div class="stat-value">${avgLast5.avg.toFixed(2)}</div>
                            <div class="stat-label">Avg Last 5 (km/l)</div>
                        </div>
                        <div class="stat-box ${trend.class}">
                            <div class="stat-value">${trend.icon}</div>
                            <div class="stat-label">${trend.text}</div>
                        </div>
                    </div>
                    ${avgLast5.dateRange ? `<p style="text-align: center; color: var(--text-light); font-size: 0.9rem;">Date Range: ${avgLast5.dateRange}</p>` : ''}
                </div>
            `;
        }

        function renderBestVehicle(data) {
            const vehicles = ['6118', '2751'];
            let bestVehicle = null;
            let bestMileage = 0;

            vehicles.forEach(vehicle => {
                const vehicleData = data.filter(e => e.vehicle === vehicle);
                if (vehicleData.length > 0) {
                    const totalMileage = calculateTotalMileage(vehicleData);
                    if (totalMileage > bestMileage) {
                        bestMileage = totalMileage;
                        bestVehicle = vehicle;
                    }
                }
            });

            if (bestVehicle) {
                return `
                    <div class="best-vehicle">
                        🏆 Best Efficiency: Vehicle ${bestVehicle} (${bestMileage.toFixed(2)} km/l)
                    </div>
                `;
            }
            return '';
        }

        function renderVehicleDashboard(data) {
            const vehicles = ['6118', '2751'];
            let html = '<div class="card"><h2>🚗 Vehicle-wise Dashboard</h2>';

            vehicles.forEach(vehicle => {
                const vehicleData = data.filter(e => e.vehicle === vehicle);
                
                if (vehicleData.length === 0) return;

                const latestMileage = vehicleData.length >= 2 ? 
                    calculateMileageBetween(vehicleData[vehicleData.length - 2], vehicleData[vehicleData.length - 1]) : 0;
                
                const totalMileage = calculateTotalMileage(vehicleData);
                const avgLast5 = calculateAverageMileage(vehicleData, 5);
                const trend = calculateTrend(vehicleData);
                const stats = calculateVehicleStats(vehicleData);

                html += `
                    <div class="vehicle-card">
                        <div class="vehicle-header">🚗 Vehicle: ${vehicle}</div>
                        <div class="vehicle-stats">
                            <div class="vehicle-stat">
                                <span class="vehicle-stat-label">Latest Mileage</span>
                                <span class="vehicle-stat-value">${latestMileage > 0 ? latestMileage.toFixed(2) + ' km/l' : 'N/A'}</span>
                            </div>
                            <div class="vehicle-stat">
                                <span class="vehicle-stat-label">Avg (Last 5)</span>
                                <span class="vehicle-stat-value">${avgLast5.avg.toFixed(2)} km/l</span>
                            </div>
                            ${avgLast5.dateRange ? `
                            <div class="vehicle-stat">
                                <span class="vehicle-stat-label">Date Range</span>
                                <span class="vehicle-stat-value" style="font-size: 0.85rem;">${avgLast5.dateRange}</span>
                            </div>
                            ` : ''}
                            <div class="vehicle-stat">
                                <span class="vehicle-stat-label">Trend</span>
                                <span class="trend ${trend.class}">${trend.icon} ${trend.text}</span>
                            </div>
                            <div class="vehicle-stat">
                                <span class="vehicle-stat-label">Total Mileage</span>
                                <span class="vehicle-stat-value">${totalMileage.toFixed(2)} km/l</span>
                            </div>
                            <div class="vehicle-stat">
                                <span class="vehicle-stat-label">Total Distance</span>
                                <span class="vehicle-stat-value">${stats.totalDistance.toFixed(0)} km</span>
                            </div>
                            <div class="vehicle-stat">
                                <span class="vehicle-stat-label">Total Fuel</span>
                                <span class="vehicle-stat-value">${stats.totalFuel.toFixed(2)} L</span>
                            </div>
                            <div class="vehicle-stat">
                                <span class="vehicle-stat-label">Refills</span>
                                <span class="vehicle-stat-value">${stats.refills}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            return html;
        }

        function renderPerEntryMileage(data) {
            let html = '<div class="card"><h2>⛽ Mileage Per Entry</h2><div class="mileage-list">';

            const vehicles = ['6118', '2751'];
            
            vehicles.forEach(vehicle => {
                const vehicleData = data.filter(e => e.vehicle === vehicle);
                
                for (let i = 1; i < vehicleData.length; i++) {
                    const prev = vehicleData[i - 1];
                    const curr = vehicleData[i];
                    const distance = curr.speedometer - prev.speedometer;
                    const mileage = distance / curr.liters;

                    html += `
                        <div class="mileage-item">
                            <div class="mileage-item-header">
                                <span class="mileage-date">${formatDate(curr.date)}</span>
                                <span class="mileage-vehicle">${curr.vehicle}</span>
                            </div>
                            <div class="mileage-details">
                                <div class="mileage-detail">
                                    <div class="mileage-detail-value">${distance.toFixed(0)}</div>
                                    <div class="mileage-detail-label">km travelled</div>
                                </div>
                                <div class="mileage-detail">
                                    <div class="mileage-detail-value">${curr.liters.toFixed(2)}</div>
                                    <div class="mileage-detail-label">liters filled</div>
                                </div>
                                <div class="mileage-detail">
                                    <div class="mileage-detail-value">${mileage.toFixed(2)}</div>
                                    <div class="mileage-detail-label">km/l</div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });

            html += '</div></div>';
            return html;
        }

        // Calculation Functions
        function calculateTotalMileage(data) {
            if (data.length === 0) return 0;
            const latest = data[data.length - 1];
            const totalLiters = data.reduce((sum, e) => sum + e.liters, 0);
            return latest.speedometer / totalLiters;
        }

        function calculateAverageMileage(data, count) {
            const mileages = [];
            
            // Group by vehicle and calculate per-entry mileage
            const vehicles = [...new Set(data.map(e => e.vehicle))];
            
            vehicles.forEach(vehicle => {
                const vehicleData = data.filter(e => e.vehicle === vehicle);
                for (let i = 1; i < vehicleData.length; i++) {
                    const distance = vehicleData[i].speedometer - vehicleData[i - 1].speedometer;
                    const mileage = distance / vehicleData[i].liters;
                    mileages.push({
                        mileage,
                        date: vehicleData[i].date
                    });
                }
            });

            // Sort by date and take last N entries
            mileages.sort((a, b) => new Date(a.date) - new Date(b.date));
            const lastN = mileages.slice(-count);

            if (lastN.length === 0) return { avg: 0, dateRange: null };

            const avg = lastN.reduce((sum, m) => sum + m.mileage, 0) / lastN.length;
            const dateRange = lastN.length > 1 ? 
                `${formatDate(lastN[0].date)} → ${formatDate(lastN[lastN.length - 1].date)}` : 
                formatDate(lastN[0].date);

            return { avg, dateRange };
        }

        function calculateTrend(data) {
            const avgResult = calculateAverageMileage(data, 5);
            const avg5 = avgResult.avg;

            if (data.length < 7) {
                return { icon: '➡️', text: 'Stable', class: 'stable' };
            }

            // Calculate average of previous 5 entries
            const mileages = [];
            const vehicles = [...new Set(data.map(e => e.vehicle))];
            
            vehicles.forEach(vehicle => {
                const vehicleData = data.filter(e => e.vehicle === vehicle);
                for (let i = 1; i < vehicleData.length; i++) {
                    const distance = vehicleData[i].speedometer - vehicleData[i - 1].speedometer;
                    const mileage = distance / vehicleData[i].liters;
                    mileages.push({ mileage, date: vehicleData[i].date });
                }
            });

            mileages.sort((a, b) => new Date(a.date) - new Date(b.date));

            if (mileages.length < 10) {
                return { icon: '➡️', text: 'Stable', class: 'stable' };
            }

            const prev5 = mileages.slice(-10, -5);
            const avgPrev5 = prev5.reduce((sum, m) => sum + m.mileage, 0) / prev5.length;

            const diff = avg5 - avgPrev5;
            const percentChange = (diff / avgPrev5) * 100;

            if (percentChange > 2) {
                return { icon: '↑', text: 'Improving', class: 'up' };
            } else if (percentChange < -2) {
                return { icon: '↓', text: 'Declining', class: 'down' };
            } else {
                return { icon: '➡️', text: 'Stable', class: 'stable' };
            }
        }

        function calculateMileageBetween(prev, curr) {
            const distance = curr.speedometer - prev.speedometer;
            return distance / curr.liters;
        }

        function calculateVehicleStats(data) {
            if (data.length === 0) return { totalDistance: 0, totalFuel: 0, refills: 0 };
            
            return {
                totalDistance: data[data.length - 1].speedometer - data[0].speedometer,
                totalFuel: data.reduce((sum, e) => sum + e.liters, 0),
                refills: data.length
            };
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const options = { day: 'numeric', month: 'short', year: 'numeric' };
            return date.toLocaleDateString('en-IN', options);
        }
    </script>
